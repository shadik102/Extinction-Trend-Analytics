name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          curl --max-redirs 10 -I "$APP_URL"
